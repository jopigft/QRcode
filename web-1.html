<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blind__QRcode</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;       
            background-color: #f0f0f0; 
            font-family: sans-serif;
        }

        .CONTAINER {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            text-align: center;     
            max-width: 900px;       
            padding: 40px;          
            border-radius: 50px; 
            
            
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .IMG {
            border-radius: 40px;    
            background-color: aqua;
            overflow: hidden; 
            display: block;
            margin-bottom: 30px;    
        }

        .IMG img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            color: #ffffff;            
            font-size: 32px;        
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>

    <div class="CONTAINER">
        <div class="IMG">
            <img src="qrcode.jpg" width="900" height="900" alt="QR Code"> 
        </div>
        <h1>อุปกรณ์ตรวจจับวัตถุช่วยเหลือผู้พิการทางสายตา</h1>
    </div>

</body>
</html>
